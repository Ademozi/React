<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0px;
        margin-bottom: 0px;
      }

      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        /* the first value is vertical space */
        /* the second value is horizontal space */
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        /* 100vh = 100% of the height of the browser */
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user {
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot {
        display: flex;
        align-items: start;
      }

      .chat-message-text {
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }

      .chat-message-profile { 
        width: 45px;
      }

      .chat-messages-container {
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .welcome-message {
        color: rgb(120, 120, 120);
        text-align: center;
      }

      .loading-spinner {
        height: 40px;
        margin: -15px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    
    <!-- type="text/babel" to transform JSX into JavaScript -->
    <script type="text/babel">
        function ChatInput({ chatMessages, setChatMessages }) {
          const [inputText, setInputText] = React.useState('')

          function saveInputText(event) {
            // event.target = gives us the element that we're typing in
            // setInputText now every time we change the text 
            // it's gonna save the text inside inputText
            setInputText(event.target.value);

          }

          async function sendMessage() {
            const newChatMessages = [
              ...chatMessages,
              {
                message: inputText,
                sender: 'user',
                id: crypto.randomUUID()
              },
              // add the Loading... message to the newChatMessages
              // but we have to remove it later
              {
                message: <img src="loading-spinner.gif" className="loading-spinner" />,
                sender: 'robot',
                id: crypto.randomUUID()
              }
            ];

            setChatMessages(newChatMessages);

            // (clear the textbox immediately after clicking Send).
            setInputText('');

            // from the external library
            const response = await Chatbot.getResponseAsync(inputText);
            setChatMessages([
              ...newChatMessages.slice(0, newChatMessages.length - 1),
              {
                message: response,
                sender: 'robot',
                id: crypto.randomUUID()
              }
            ]);

          }

            return (
                <div className="chat-input-container">
                    <input 
                      placeholder="Send message to the Chatbot" 
                      size="30" 
                      onChange={saveInputText}
                      // when the inputText becomes empty this will become empty too
                      value={inputText}
                      className="chat-input"
                    />
                    <button
                      onClick={sendMessage}
                      className="send-button"
                    >Send</button>
                </div>
            );
        }

        function ChatMessage(props) {
          // destructuring
          // same as const message = props.message; const sender = props.sender;
          const {message, sender} = props;
          // or write {message, sender} as parameter of the function instead of props

          /*
          if (sender === "robot") {
            return (
              // we use div instead of <> because a div is block element that take a full line
              <div>
                <img src="robot.png" width="50" />
                {message}
                </div>
            );
          }
          */

          return (
            // we use div instead of <> because a div is block element that take a full line
            <div className={
              sender === 'user' 
              ? 'chat-message-user' 
              : 'chat-message-robot'
            }>
              {/* this is the guard operator */}
              {sender === "robot" && (
                <img src="robot.png" className="chat-message-profile" />
              )}
              <div className="chat-message-text">
                {message}
              </div>
              {sender === "user" && (
                <img src="user.png" className="chat-message-profile" />
              )}
            </div>
          );
        }

        function ChatMessages({ chatMessages }) {
          const chatMessagesRef = React.useRef(null);

          // react will run this function:
          // after components is created
          // every time the component is updated
          React.useEffect(() => {
            const containerElem = chatMessagesRef.current;
            if (chatMessagesRef) {
              containerElem.scrollTop = containerElem.scrollHeight;
              // scrollTop = how far from the top should we scroll
              // scrollHeight = total height of the element
            }
          }, [chatMessages]);
          // [] Controls when useEffect runs
          // empty [] = only run once, after the component is created

          return (
            <div className="chat-messages-container"
            ref={chatMessagesRef}>
              {chatMessages.map((chatMessage) => {
                return (
                  <ChatMessage 
                    message={chatMessage.message} 
                    sender={chatMessage.sender} 
                    key={chatMessage.id}
                  />
                );
              })}
            </div>
          );
        }


        function App() {
          const [chatMessages, setChatMessages] = React.useState([]);
          // useState has two elements in the array, 
          // the first is the state 
          // and the second is the function to update the state
          // const chatMessages = array[0];
          // const setChatMessages = array[1];
          // we should always use the setChatMessages to update the data
          // ----------------------------------------------------
          // we can use Array Destructuring for shortcut
          // const [chatMessages, setChatMessages] = array;

          return (
            <div className="app-container">
                {chatMessages.length === 0 && (
                    <p className="welcome-message">
                        Welcome to the chatbot project! Send a message using the textbox below.    
                    </p>
                )}

                {/* ChatInput() */}
                {/* This is another way to use the component */}
                {/* by using React we can create our own HTML elements */}
                <ChatMessages
                  chatMessages={chatMessages}
                />
                <ChatInput
                  chatMessages = {chatMessages}
                  setChatMessages = {setChatMessages}
                /> 
            </div> 
          );
        }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
